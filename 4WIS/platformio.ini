[env:nodemcu-32s]
platform = espressif32
board = nodemcu-32s
framework = arduino

; ============================================================
; 1. 序列埠與上傳設定
; ============================================================
monitor_speed = 115200
upload_speed = 921600

; ============================================================
; 2. 記憶體分區表 (極度重要：解決 Bluepad32 + ROS 容量問題)
; ============================================================
board_build.partitions = huge_app.csv

; ============================================================
; 3. Micro-ROS 設定
; ============================================================
board_microros_transport = serial
board_microros_distro = humble

; ============================================================
; 4. 函式庫相依性 (Library Dependencies)
; ============================================================
platform_packages =
    framework-arduinoespressif32 @ https://github.com/ricardoquesada/esp32-arduino-lib-builder/releases/download/4.1.0/esp32-bluepad32-4.1.0.zip

lib_deps =
    ; Micro-ROS
    https://github.com/micro-ROS/micro_ros_platformio
    
    ; 步進馬達驅動 (硬體定時器版，解決卡頓的核心)
    gin66/FastAccelStepper @ ^0.30.6
    
    ; BLDC 控制庫
    madhephaestus/ESP32Servo @ ^3.0.5

; ============================================================
; 5. 編譯參數
; ============================================================
build_flags =
    -D CORE_DEBUG_LEVEL=0
    -O2